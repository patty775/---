<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露娜巨蟹塔羅 🌸 靈魂之鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 導入最美圓體：Zen Maru Gothic -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-petal: #FFFBFC; 
            --soft-rose: #FFE5EC; 
            --deep-petal: #FB6F92; 
            --text-main: #6D5959;
        }

        body {
            background: linear-gradient(145deg, #FFFBFC 0%, #FFF0F3 100%);
            color: var(--text-main);
            font-family: 'Zen Maru Gothic', sans-serif;
            min-height: 100vh;
            line-height: 1.8;
            margin: 0;
        }

        /* 縮小成一排的簡介 */
        .intro-line {
            font-size: 0.85rem;
            white-space: nowrap;
            letter-spacing: 0.05em;
            color: #B5A4A4;
            display: block;
            margin-top: 5px;
        }

        /* 塔羅牌視覺樣式 */
        .tarot-card { perspective: 1000px; width: 160px; height: 280px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 2px solid var(--soft-rose);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card-back {
            background: #FFFFFF;
            background-image: radial-gradient(var(--soft-rose) 1.5px, transparent 1.5px);
            background-size: 15px 15px;
        }
        .card-front { background: #fff; transform: rotateY(180deg); }
        .reversed-img { transform: rotate(180deg); }

        /* 字體比例設定 */
        .body-text { font-size: 1.1rem; } 
        /* 卡牌標題設定為內文的 2 倍大 */
        .card-name-title { 
            font-size: 2.2rem; 
            font-weight: 700; 
            color: var(--deep-petal);
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .btn-luna {
            background: var(--soft-rose);
            color: #8D7373;
            border-radius: 100px;
            transition: all 0.3s;
        }
        .btn-luna:hover:not(:disabled) {
            background: var(--deep-petal);
            color: white;
            transform: scale(1.05);
        }
        
        .report-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            border: 1px solid var(--soft-rose);
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto text-center">
        <!-- 頁首區 -->
        <header class="mb-10">
            <h1 class="text-5xl font-bold text-[#E5989B] mb-2">露娜巨蟹塔羅</h1>
            <p class="intro-line">塔羅牌是一面映照內心的鏡子。透過牌義，我們看見潛意識的答案，找到前行的力量與方向。</p>
        </header>

        <!-- 操作介面 -->
        <div class="bg-white/60 p-8 rounded-[40px] border border-white mb-12">
            <div class="flex justify-center gap-4 mb-8">
                <button onclick="setMode('single')" id="m-single" class="px-6 py-2 rounded-full bg-[#FFE5EC] text-[#7A6A6A] font-bold text-sm shadow-sm">單張占卜</button>
                <button onclick="setMode('triple')" id="m-triple" class="px-6 py-2 rounded-full bg-white text-gray-400 font-bold text-sm border border-[#F1F3F5]">聖三角牌陣</button>
            </div>
            <textarea id="question" rows="2" placeholder="輕輕寫下你想解決的問題..." class="w-full p-6 rounded-3xl border-2 border-[#FFE5EC] outline-none focus:border-[#FB6F92] body-text mb-6"></textarea>
            <!-- 按鈕已改為：翻開靈魂之鏡 -->
            <button onclick="drawCards()" id="drawBtn" class="btn-luna px-16 py-4 text-2xl font-bold">翻開靈魂之鏡</button>
        </div>

        <!-- 牌區 -->
        <div id="cardStage" class="flex flex-wrap justify-center gap-8 mb-16"></div>

        <!-- 解讀區 -->
        <div id="reportBox" class="hidden report-box p-8 md:p-16 text-left">
            <h3 class="text-3xl text-[#E5989B] font-bold mb-12 text-center">🌸 靈魂鏡像導航報告 🌸</h3>
            <div id="analysisArea" class="space-y-20"></div>
            <div class="mt-20 text-center">
                <button onclick="location.reload()" class="text-[#B5A4A4] underline text-sm">重啟對話，再次感應</button>
            </div>
        </div>
    </div>

    <script>
        let mode = 'single';
        const deck = [];
        const zhMajors = ["愚者", "魔術師", "女教皇", "女皇", "皇帝", "教皇", "戀人", "戰車", "力量", "隱士", "命運之輪", "正義", "倒吊人", "死神", "節制", "惡魔", "高塔", "星星", "月亮", "太陽", "審判", "世界"];
        const zhSuits = ["權杖", "聖杯", "寶劍", "錢幣"];

        // 初始化 78 張牌庫
        for(let i=0; i<22; i++) {
            deck.push({ name: zhMajors[i], img: `https://raw.githubusercontent.com/gaoge0110/tarot/master/public/cards-min/m${i}.jpg` });
        }
        const suitCodes = ['w', 'c', 's', 'p'];
        zhSuits.forEach((s, si) => {
            for(let n=1; n<=14; n++) {
                let rank = n;
                if(n===1) rank="Ace"; else if(n===11) rank="隨從"; else if(n===12) rank="騎士"; else if(n===13) rank="皇后"; else if(n===14) rank="國王";
                deck.push({ name: s+rank, img: `https://raw.githubusercontent.com/gaoge0110/tarot/master/public/cards-min/${suitCodes[si]}${n}.jpg` });
            }
        });

        function setMode(m) {
            mode = m;
            const activeClass = "px-8 py-2 rounded-full bg-[#FFE5EC] text-[#7A6A6A] font-bold text-sm shadow-sm";
            const inactiveClass = "px-8 py-2 rounded-full bg-white text-gray-400 font-bold text-sm border border-[#F1F3F5]";
            document.getElementById('m-single').className = m === 'single' ? activeClass : inactiveClass;
            document.getElementById('m-triple').className = m === 'triple' ? activeClass : inactiveClass;
        }

        function drawCards() {
            const q = document.getElementById('question').value;
            if(!q) return alert("要讓露娜知道你的困惑，靈魂之鏡才能顯現答案喔。🍭");
            
            document.getElementById('drawBtn').disabled = true;
            const stage = document.getElementById('cardStage'); stage.innerHTML = "";
            document.getElementById('reportBox').classList.add('hidden');

            const count = mode === 'single' ? 1 : 3;
            const selected = [];
            const tempDeck = [...deck];

            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * tempDeck.length);
                const card = tempDeck.splice(idx, 1)[0];
                card.isRev = Math.random() > 0.4;
                selected.push(card);
            }

            selected.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = "tarot-card";
                div.innerHTML = `
                    <div class="card-inner" id="c-${i}">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <img src="${card.img}" class="w-full h-full object-cover ${card.isRev ? 'reversed-img' : ''}" onerror="this.src='https://placehold.co/160x280?text=Luna+Tarot'">
                        </div>
                    </div>
                `;
                stage.appendChild(div);
                setTimeout(() => document.getElementById(`c-${i}`).classList.add('flipped'), 500 + i*500);
            });

            setTimeout(() => showSolution(q, selected), 2000 + count*500);
        }

        function showSolution(q, cards) {
            const area = document.getElementById('analysisArea');
            document.getElementById('reportBox').classList.remove('hidden');

            let html = `<div class="bg-[#FFF9FA] p-8 rounded-3xl text-pink-500 italic mb-12 text-center border border-[#FFE5EC] body-text">
                「關於您的問題：${q}」<br>靈魂之鏡已映照出前行的方向...
            </div>`;

            cards.forEach((card, i) => {
                const step = mode === 'single' ? '核心啟示' : ['問題的根源', '目前的突破口', '未來的解決路徑'][i];
                
                html += `
                <div class="space-y-8 pb-16 border-b border-[#FDF2F4] last:border-0">
                    <h4 class="card-name-title">${step}：${card.name} (${card.isRev ? '逆位' : '正位'})</h4>
                    
                    <div class="space-y-8 body-text text-[#6D5959]">
                        <section>
                            <h5 class="font-bold text-[#E5989B] text-xl mb-3">📍 現況映射：</h5>
                            <p>這張牌顯示出你目前正被一種${card.isRev ? '能量停滯或方向偏差' : '具有強大支持且穩定'}的頻率所包圍。${card.isRev ? '這代表你現在的心力可能放在了錯誤的地方，或是在重複某個無效的循環。這面鏡子在提醒你，外在的阻礙其實源於內在的未竟之志。' : '這是一個非常明亮的信號，代表你目前的努力都在正確的軌道上。你所擔心的問題，其實已經具備了成功的基因，只需等待時間的催化。'}</p>
                        </section>

                        <section>
                            <h5 class="font-bold text-[#E5989B] text-xl mb-3">🛠️ 實戰突破策略（怎麼做？）：</h5>
                            <p>針對這個情況，露娜建議你：${card.isRev ? '「學會留白」就是最強大的解決之道。不要急著去修補或改變結果，現在適合收回你的能量，進行一次心理上的斷捨離。當你不再執著於控制，事情反而會因為你的放鬆而出現轉機。' : '「果斷執行」是目前的唯一捷徑。這張牌要求你把想法轉化為行動，不論是主動溝通還是提交計畫，現在的勝算非常高。你不需要完美的計畫，只需要踏出第一步的勇氣。'} </p>
                        </section>

                        <section>
                            <h5 class="font-bold text-[#E5989B] text-xl mb-3">🧘 心理建設建議：</h5>
                            <p>${card.isRev ? '請對自己溫柔一點。現在的「不順」其實是宇宙在幫你剔除不適合的東西，它是為了保護你。試著把焦點轉回自己身上，照顧好自己的情緒，就是對未來最好的投資。' : '請保持那份最初的熱情。這張牌在肯定你的價值，它是靈魂在對你微笑。保持開放的心態，好運自然會被你那份正向的頻率吸引而來。'}</p>
                        </section>

                        <section class="bg-[#FFFDFD] p-8 rounded-3xl border border-[#FFE5EC]">
                            <h5 class="font-bold text-[#D4A5A5] mb-4 text-xl">✅ 今日實踐清單（立刻做的三件事）：</h5>
                            <ul class="list-disc pl-8 space-y-3 text-[#8E7E7E]">
                                <li>${card.isRev ? '主動拒絕一個讓你感到內耗的請求或聚會。' : '聯絡一個能直接給予你具體幫助的關鍵人物。'}</li>
                                <li>${card.isRev ? '整理你的個人空間，特別是丟掉一件不再需要的舊物品。' : '在今天下午三點前，完成一個你拖延最久的小任務。'}</li>
                                <li>${card.isRev ? '比平常早睡一小時，並在睡前聽十分鐘的助眠音樂。' : '看著鏡子對自己說三次：「我有能力創造我想要的未來」。'}</li>
                            </ul>
                        </section>
                    </div>
                </div>`;
            });

            if(mode === 'triple') {
                html += `
                <div class="bg-[#FFE5EC]/40 p-10 rounded-[50px] text-center mt-12 border-2 border-white shadow-sm">
                    <h4 class="text-[#E5989B] font-bold mb-6 text-3xl">🌟 靈魂能量最終導航</h4>
                    <p class="text-xl text-[#8E7E7E]">從這三張牌的流動來看，這是一場從「${cards[0].name}」的積累轉化到「${cards[2].name}」的具體成果的旅程。不要被眼前的迷霧遮蔽了雙眼，露娜會一直陪伴著你，直到你重拾內心的力量。🌿</p>
                </div>`;
            }

            area.innerHTML = html;
            document.getElementById('drawBtn').disabled = false;
            setTimeout(() => {
                document.getElementById('reportBox').scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }
    </script>
</body>
</html>
